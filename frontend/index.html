<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webアプリ</title>
</head>
<body>
  <div>
    <button id="showJson">JSON 表示</button>
  </div>
  <pre id="tableJson" style="white-space: pre-wrap; background:#f6f6f6; padding:8px;">読み込み待ち...</pre>

  
  <h3>レコード追加</h3>

  <form id="recordForm">

    <input
      id="id"
      type="number"
      placeholder="id">

    <input
      id="player_id"
      type="number"
      placeholder="player_id">

    <input
      id="distance_id"
      type="number"
      placeholder="distance_id">

    <input
      id="record"
      type="time">

    <input
      id="run_date"
      type="date">

    <input
      id="notes"
      type="text"
      placeholder="notes">

    <button type="submit">
      追加
    </button>

  </form>

  <hr>

  <h3>レコード削除</h3>

  <form id="deleteForm">

    <input
      id="deleteId"
      type="number"
      placeholder="id">

    <button type="submit">
      削除
    </button>

  <script src="app.js"></script>
</body>
</html>
