<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webアプリ</title>
</head>
<body>
  <div>
    <button id="showJson">表示</button>
  </div>
  <div id="tableContainer">「表示」ボタンを押すか、データを読み込んでください。</div>
  <h3>レコード追加</h3>

  <form id="recordForm">

    <input
      id="player_id"
      type="number"
      placeholder="player_id">

    <input
      id="distance_id"
      type="number"
      placeholder="distance_id">

    <input
      id="record"
      type="text"
      placeholder="record">

    <input
      id="run_date"
      type="date">

    <input
      id="notes"
      type="text"
      placeholder="notes">

    <button type="submit">
      追加
    </button>

  </form>

  <hr>

  <h3>レコード削除</h3>

  <form id="deleteForm">

    <input
      id="deleteId"
      type="number"
      placeholder="id">

    <button type="submit">
      削除
    </button>
  </form>

  <script src="app.js"></script>
</body>
</html>
